{% extends "myApp/base2.html" %}

{% block content %}
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #1c1c1c;
        color: white;
    }

    .container {
        display: flex;
        justify-content: center;
        margin-top: 2rem;
        gap: 2rem;
        padding: 0 2rem;
    }

    .calendar-section {
        flex: 2;
    }

    .calendar-nav {
        margin-bottom: 20px;
        text-align: center;
    }

    .calendar-nav a {
        padding: 0.75rem 1.5rem;
        background-color: #4CAF50;
        color: white;
        text-decoration: none;
        margin: 0 15px;
        font-size: 1.1rem;
        border-radius: 6px;
    }

    table {
        border-collapse: collapse;
        width: 100%;
        font-size: 1.25rem;
    }

    th, td {
        border: 1px solid #ddd;
        text-align: center;
        padding: 20px;
        height: 120px;
        background-color: #eaeaea;
        color: black;
    }

    .notes-section {
        flex: 1;
        max-width: 350px;
        background-color: #2c2c2c;
        padding: 1.5rem;
        border-radius: 12px;
        height: fit-content;
    }

    .notes-section h2 {
        color: white;
        text-align: center;
        margin-bottom: 1.2rem;
        font-size: 1.5rem;
    }

    .notes-section textarea {
        width: 100%;
        height: 350px;
        background-color: #1e1e1e;
        color: white;
        border: 1px solid #555;
        border-radius: 6px;
        padding: 12px;
        font-size: 1rem;
        resize: none;
    }

    .notes-section button {
        margin-top: 12px;
        width: 100%;
        padding: 12px;
        font-size: 1rem;
        background-color: #4CAF50;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
    }

    .notes-section button:hover {
        background-color: #45a049;
    }
</style>

<h1 style="text-align:center; font-size: 2.5rem;">{{ month_name }} {{ year }}</h1>

<div class="calendar-nav">
    <a href="?month={{ prev_month.month }}&year={{ prev_month.year }}">⬅ Prev</a>
    <a href="?month={{ next_month.month }}&year={{ next_month.year }}">Next ➡</a>
</div>

<div class="container">
    <div class="calendar-section">
        <div class="calendar">
            {{ calendar|safe }}
        </div>
    </div>

    <div class="notes-section">
        <h2>Daily Notes</h2>
        <form method="post">
            {% csrf_token %}
            <textarea name="notes" placeholder="Write your notes here...">{{ notes }}</textarea>
            <button type="submit">Save Note</button>
        </form>
    </div>
</div>
{% endblock %}
